<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcBuddy</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>CalcBuddy</header>
<nav>
    <button data-target="norm">Calculator</button>
    <button data-target="img">Imaginary Calulator</button>
    <button data-target="gpa">GPA Calculator</button>
    <button data-target="abs">Absolute Course Calculator</button>
    <button data-target="rel">Relative Course Calculator</button>
</nav>
<main>
    <section id="norm">
        <h2>Calculator</h2>
        <div id="display">
            <p id="expression"></p>
            <p id="result"></p>
        </div>
        <div class="btn-grid">
            <button class="btn btn-special">C</button>
            <button class="btn btn-special">±</button>
            <button class="btn btn-special">%</button>
            <button class="btn btn-operator">÷</button>
            <button class="btn btn-number">7</button>
            <button class="btn btn-number">8</button>
            <button class="btn btn-number">9</button>
            <button class="btn btn-operator">×</button>
            <button class="btn btn-number">4</button>
            <button class="btn btn-number">5</button>
            <button class="btn btn-number">6</button>
        <button class="btn btn-operator">-</button>
        <button class="btn btn-number">1</button>
        <button class="btn btn-number">2</button>
        <button class="btn btn-number">3</button>
        <button class="btn btn-operator">+</button>
        <button class="btn btn-zero">0</button>
        <button class="btn">.</button>
        <button class="btn btn-operator">=</button>
            


        </div>
    </section>
    <section id="img">

    </section>
    <section id="gpa">

    </section>
    <section id="abs">
        
    </section>
    <section id="rel">
        
    </section>
</main>






    <footer>Zaima Amjad</footer>
    <script src="js/main.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/imaginary.js"></script>
    <script src="js/gpa.js"></script>
    <script src="js/absgrade.js"></script>
    <script src="js/relgrade.js"></script>
    

   
</body>
</html>
